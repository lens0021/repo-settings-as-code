---
name: Repo Setting as Code
description: Manage GitHub repository settings with OpenTofu
inputs:
  github-token:
    required: true
  working-directory:
    default: .tf

runs:
  using: composite
  steps:
    - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
    - run: tofu init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    - name: Apply imports
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        TF_VAR_github_actions: "true"
      run: |
        tfplan=$(mktemp)
        tofu plan -out="$tfplan" || true
        if tofu show -json "$tfplan" | jq -e '
             [.resource_changes[]? |
              select(.change.actions != ["no-op"] and .change.actions != ["read"])] | length == 0
           '; then
          tofu apply -auto-approve "$tfplan"
        fi
    - id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: tofu plan -no-color -detailed-exitcode
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        TF_VAR_github_actions: "true"
    - if: github.event_name == 'pull_request'
      name: Comment plan on PR
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const output = `#### OpenTofu Plan
          \`\`\`
          ${process.env.PLAN_OUTPUT}
          \`\`\`
          [View run](${runUrl})`;
          const comments = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          const existing = comments.data.find(c =>
            c.user.type === 'Bot' && c.body.includes('#### OpenTofu Plan')
          );
          if (existing) {
            github.rest.issues.updateComment({
              comment_id: existing.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
          } else {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
          }
          await core.summary.addRaw(`Plan comment ${existing ? 'updated' : 'created'}.`).write();
    - if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      name: Manage drift issue
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
        PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const issueTitle = 'OpenTofu: apply needed';
          const hasChanges = process.env.PLAN_EXIT_CODE === '2';

          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            creator: 'github-actions[bot]',
          });
          const existing = issues.find(i => i.title === issueTitle);

          if (hasChanges) {
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Drift detected on \`main\` at ${context.sha.substring(0, 7)}.\n\n\`\`\`\n${process.env.PLAN_OUTPUT}\n\`\`\`\n\n[View run](${runUrl})`;
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
              });
            }
          } else if (existing) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
              state_reason: 'completed',
            });
          }
          await core.summary.addRaw(hasChanges ? 'Drift detected.' : existing ? 'Drift resolved.' : 'No drift.').write();
    - if: steps.plan.outputs.exitcode == 1
      shell: bash
      run: exit "$PLAN_EXIT_CODE"
      env:
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
