---
name: Tofu
on:
  pull_request:
    paths:
      - ".tf/**"
      - .github/workflows/tf.yaml
  push:
    branches:
      - main
    paths:
      - ".github/tf/**"
      - .github/workflows/tf.yaml
  workflow_dispatch:

permissions: {}

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: lens0021/repo-settings-as-code@a4b5bd3293cd95c6ba0e7ddefc13434b589f6520 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
